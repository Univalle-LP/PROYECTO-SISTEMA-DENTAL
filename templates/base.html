{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        {% block title %}
        Sistema
        {% endblock %}

    </title>

    <!-- BOOTSTRAP -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- BOOTSTRAP ICONS -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#f1f5f9;

            overflow-x:hidden;

            font-family:Arial, Helvetica, sans-serif;
        }

        /* =========================
           SIDEBAR
        ========================= */

        .sidebar{

            position:fixed;

            top:0;

            left:0;

            width:270px;

            height:100vh;

            background:linear-gradient(
                180deg,
                #0f172a,
                #1e293b
            );

            color:white;

            box-shadow:5px 0 20px rgba(0,0,0,0.15);

            z-index:1000;

            overflow-y:auto;
        }

        /* =========================
           LOGO
        ========================= */

        .logo{

            display:flex;

            align-items:center;

            gap:12px;

            padding:22px 18px;

            border-bottom:1px solid rgba(255,255,255,.08);

            margin-bottom:20px;
        }

        .logo img{

            width:60px;

            height:60px;

            object-fit:contain;

            background:white;

            border-radius:12px;

            padding:5px;

            display:block;
        }

        .logo-text{

            display:flex;

            flex-direction:column;
        }

        .logo-text h2{

            font-size:24px;

            font-weight:700;

            color:white;

            margin:0;
        }

        .logo-text p{

            margin:0;

            color:rgba(255,255,255,.65);

            font-size:12px;
        }

        /* =========================
           MENU
        ========================= */

        .menu{

            padding:0 15px 20px;
        }

        .menu a{

            display:flex;

            align-items:center;

            gap:15px;

            text-decoration:none;

            color:rgba(255,255,255,.8);

            padding:14px 18px;

            border-radius:14px;

            margin-bottom:10px;

            transition:.3s;

            font-size:15px;

            font-weight:500;
        }

        .menu a:hover{

            background:rgba(255,255,255,.08);

            color:white;

            transform:translateX(4px);
        }

        .menu a.active{

            background:linear-gradient(
                135deg,
                #2563eb,
                #3b82f6
            );

            color:white;

            box-shadow:0 4px 15px rgba(37,99,235,.35);
        }

        .menu i{

            font-size:19px;
        }

        /* =========================
           MAIN CONTENT
        ========================= */

        .main-content{

            margin-left:270px;

            padding:30px;

            min-height:100vh;
        }

        /* =========================
           RESPONSIVE
        ========================= */

        @media(max-width:992px){

            .sidebar{

                width:95px;
            }

            .logo{

                flex-direction:column;

                justify-content:center;

                text-align:center;
            }

            .logo-text{

                display:none;
            }

            .menu a span{

                display:none;
            }

            .main-content{

                margin-left:95px;
            }
        }

    </style>

</head>

<body>

<!-- =========================
     SIDEBAR
========================= -->

<div class="sidebar">

    <!-- LOGO -->

    <div class="logo">

        <!-- RUTA CORREGIDA -->

        <img src="{% static 'img/carident.png' %}"
             alt="CARIDENT">

        <div class="logo-text">

            <h2>
                CARIDENT
            </h2>

            <p>
                Sistema Odontológico
            </p>

        </div>

    </div>

    <!-- MENU -->

    <div class="menu">

        <a href="/dashboard/" class="active">

            <i class="bi bi-grid-fill"></i>

            <span>Dashboard</span>

        </a>

        <a href="/pacientes/">

            <i class="bi bi-people-fill"></i>

            <span>Pacientes</span>

        </a>

        <a href="/citas/">

            <i class="bi bi-calendar-check-fill"></i>

            <span>Citas</span>

        </a>

        <a href="/consultas/">

            <i class="bi bi-file-earmark-medical-fill"></i>

            <span>Consultas</span>

        </a>

        <a href="/imagenes/">

            <i class="bi bi-image-fill"></i>

            <span>Imágenes</span>

        </a>

        <a href="/ia/">

            <i class="bi bi-cpu-fill"></i>

            <span>Diagnóstico IA</span>

        </a>

       

        <a href="/logout/">

            <i class="bi bi-box-arrow-left"></i>

            <span>Cerrar sesión</span>

        </a>

    </div>

</div>

<!-- =========================
     MAIN CONTENT
========================= -->

<div class="main-content">

    {% block content %}
    {% endblock %}

</div>

<!-- BOOTSTRAP JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
