{% extends 'base_auth.html' %}

{% load static %}

{% block title %}
Login
{% endblock %}

{% block content %}

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{

        background: linear-gradient(
            135deg,
            #0f172a,
            #1e293b,
            #334155
        );

        min-height:100vh;

        overflow:hidden;

        font-family:Arial, Helvetica, sans-serif;
    }

    /* =========================
       CONTENEDOR
    ========================= */

    .login-container{

        min-height:100vh;

        display:flex;

        align-items:center;

        justify-content:center;

        padding:20px;
    }

    /* =========================
       CARD LOGIN
    ========================= */

    .login-card{

        width:100%;

        max-width:460px;

        border-radius:30px;

        background:rgba(255,255,255,0.08);

        backdrop-filter:blur(18px);

        border:1px solid rgba(255,255,255,0.12);

        box-shadow:
            0 10px 40px rgba(0,0,0,0.35);

        padding:45px;

        color:white;

        animation:fadeIn .6s ease;
    }

    @keyframes fadeIn{

        from{
            opacity:0;
            transform:translateY(20px);
        }

        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    /* =========================
       LOGO
    ========================= */

    .logo-container{

        text-align:center;

        margin-bottom:25px;
    }

    .logo-container img{

        width:140px;

        height:140px;

        object-fit:contain;

        background:white;

        padding:12px;

        border-radius:25px;

        box-shadow:
            0 10px 35px rgba(59,130,246,0.45);

        margin-bottom:20px;

        transition:.3s;

        display:block;

        margin-left:auto;

        margin-right:auto;
    }

    .logo-container img:hover{

        transform:scale(1.05);
    }

    /* =========================
       TITULOS
    ========================= */

    .title{

        font-size:34px;

        font-weight:700;

        text-align:center;

        margin-bottom:8px;

        color:white;

        letter-spacing:1px;
    }

    .subtitle{

        text-align:center;

        color:rgba(255,255,255,0.7);

        margin-bottom:35px;

        font-size:15px;
    }

    /* =========================
       INPUTS
    ========================= */

    .form-control{

        height:56px;

        border-radius:16px;

        background:rgba(255,255,255,0.08);

        border:1px solid rgba(255,255,255,0.15);

        color:white;

        padding-left:18px;

        font-size:15px;
    }

    .form-control:focus{

        background:rgba(255,255,255,0.12);

        border-color:#3b82f6;

        box-shadow:
            0 0 15px rgba(59,130,246,0.4);

        color:white;
    }

    .form-control::placeholder{

        color:rgba(255,255,255,0.6);
    }

    /* =========================
       BOTON
    ========================= */

    .btn-login{

        height:56px;

        border-radius:16px;

        background:linear-gradient(
            135deg,
            #2563eb,
            #06b6d4
        );

        border:none;

        font-weight:bold;

        font-size:16px;

        transition:.3s;
    }

    .btn-login:hover{

        transform:translateY(-2px);

        box-shadow:
            0 10px 25px rgba(37,99,235,0.45);
    }

    /* =========================
       ALERTAS
    ========================= */

    .alert{

        border-radius:14px;

        font-size:14px;
    }

    /* =========================
       RESPONSIVE
    ========================= */

    @media(max-width:576px){

        .login-card{

            padding:35px 25px;
        }

        .logo-container img{

            width:110px;

            height:110px;
        }

        .title{

            font-size:28px;
        }
    }

</style>

<div class="login-container">

    <div class="login-card">

        <!-- LOGO -->

        <div class="logo-container">

            <img
                src="{% static 'img/carident.png' %}"
                alt="CARIDENT"
            >

        </div>

        <!-- TITULO -->

        <div class="title">

            CARIDENT IA

        </div>

        <div class="subtitle">

            Sistema Odontológico Inteligente

        </div>

        <!-- MENSAJES -->

        {% if messages %}

            {% for message in messages %}

                <div class="alert alert-danger">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

        <!-- FORMULARIO -->

        <form method="POST">

            {% csrf_token %}

            <!-- USUARIO -->

            <div class="mb-4">

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Ingrese su usuario"
                    required
                >

            </div>

            <!-- PASSWORD -->

            <div class="mb-4">

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Ingrese su contraseña"
                    required
                >

            </div>

            <!-- BOTON -->

            <button
                type="submit"
                class="btn btn-primary btn-login w-100"
            >

                <i class="bi bi-box-arrow-in-right"></i>

                Ingresar al Sistema

            </button>

        </form>

    </div>

</div>

{% endblock %}
